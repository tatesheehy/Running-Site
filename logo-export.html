<body>
  <h2>StatTC Logo Export</h2>
  <div class="label">Dark (for dark backgrounds)</div>
  <canvas id="dark"></canvas>
  <div class="label">Light (for light backgrounds)</div>
  <canvas id="light" style="background:#fff"></canvas>
  <div class="label">Transparent</div>
  <canvas id="transparent" style="background: repeating-conic-gradient(#333 0% 25%, #222 0% 50%) 0 0 / 14px 14px; border-radius:6px"></canvas>
  <br>
  <button onclick="dl('dark','stattc-logo-dark.png')">↓ Dark PNG</button>
  <button onclick="dl('light','stattc-logo-light.png')">↓ Light PNG</button>
  <button onclick="dl('transparent','stattc-logo-transparent.png')">↓ Transparent PNG</button>

  <script>
    const SCALE = 6;

    function drawLogo(canvas, textColor, bg) {
      const s  = SCALE;
      const pW = 11 * s;
      const pH = 21 * s;
      const gap    = 4  * s;
      const fSize  = 32 * s;
      const padX   = 10 * s;
      const padY   = 6  * s;

      // Measure text
      const tmp = document.createElement('canvas').getContext('2d');
      tmp.font = '500 ' + fSize + 'px Teko';
      const tW = tmp.measureText('StatTC').width;

      const W = padX + pW + gap + tW + padX;
      const H = padY * 2 + Math.max(pH, fSize * 1.15);

      canvas.width  = Math.ceil(W);
      canvas.height = Math.ceil(H);

      const c = canvas.getContext('2d');
      if (bg) { c.fillStyle = bg; c.fillRect(0, 0, W, H); }

      const cy = H / 2;
      const oy = cy - pH / 2 - fSize * 0.1;

      // Draw pencil
      c.save();
      c.translate(padX, oy);
      c.strokeStyle = textColor;
      c.lineWidth   = 1.5 * s;
      c.lineJoin    = 'miter';
      c.lineCap     = 'square';

      c.strokeRect(1.75*s, 0.75*s, 7.5*s, 2.75*s);

      [4.25, 5.25].forEach(y => {
        c.beginPath(); c.moveTo(1.75*s, y*s); c.lineTo(9.25*s, y*s); c.stroke();
      });

      c.beginPath();
      c.moveTo(1.75*s, 5.25*s); c.lineTo(1.75*s, 14.5*s);
      c.lineTo(5.5*s, 19.75*s); c.lineTo(9.25*s, 14.5*s);
      c.lineTo(9.25*s, 5.25*s); c.stroke();

      [[4,14],[7,14]].forEach(([x,y]) => {
        c.beginPath(); c.moveTo(x*s, 5.25*s); c.lineTo(x*s, y*s); c.stroke();
      });
      c.restore();

      // Draw text
      c.fillStyle    = textColor;
      c.font         = '500 ' + fSize + 'px Teko';
      c.textBaseline = 'middle';
      c.letterSpacing = (0.04 * fSize) + 'px';
      c.fillText('StatTC', padX + pW + gap, cy + fSize * 0.03);
    }

    function dl(id, filename) {
      document.getElementById(id).toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
      });
    }
