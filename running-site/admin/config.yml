backend:
  name: git-gateway
  branch: main

media_folder: running-site/images
public_folder: /images

collections:

  # ── ARTICLES ─────────────────────────────────────────────
  - name: articles
    label: Articles
    files:
      - name: articles
        label: Articles
        file: running-site/_data/articles.json
        fields:
          - name: items
            label: Articles
            label_singular: Article
            widget: list
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Unique ID (no spaces, e.g. jakob-oslo-2026)", name: id, widget: string }
              - label: "Category"
                name: category
                widget: select
                options:
                  - DISTANCE RUNNING
                  - SPRINTS
                  - MARATHON
                  - MIDDLE DISTANCE
                  - OPINION
                  - TECHNOLOGY
                  - HISTORY
                  - NEWS
              - label: "Content Type"
                name: type
                widget: select
                options:
                  - { label: "Article", value: "article" }
                  - { label: "Rankings Embed", value: "rankings" }
                default: "article"
                required: false
                hint: "Rankings Embed shows a live mini rankings table in the home page grid instead of an article card."
              - { label: "Rankings Event (Rankings Embed only — must match exactly, e.g. 1500m)", name: rankingsEvent, widget: string, required: false }
              - { label: "Featured (home page hero — only one! Articles only)", name: featured, widget: boolean, default: false }
              - { label: "Editor's Pick (home page sidebar — Articles only)", name: editorsPick, widget: boolean, default: false }
              - { label: "Author", name: author, widget: string, required: false }
              - { label: "Date (e.g. June 21, 2026)", name: date, widget: string }
              - { label: "Read Time (e.g. 8 min read)", name: readTime, widget: string }
              - { label: "Cover Image", name: image, widget: image, required: false, default: "" }
              - label: "Image Focus / Crop"
                name: imagePosition
                widget: image-crop
                default: "50% 50%"
                required: false
              - { label: "Excerpt (one sentence summary)", name: excerpt, widget: text }
              - { label: "Article Body", name: body, widget: markdown }

  # ── ATHLETES ─────────────────────────────────────────────
  - name: athletes
    label: "Athletes (profiles only)"
    files:
      - name: athletes
        label: "Athletes — Profile Cards"
        file: running-site/_data/athletes.json
        fields:
          - name: items
            label: "Athletes — ⚠️ Adding here only creates the profile card. To show an athlete in the rankings table, ALSO add them under Rankings → the event → Rankings rows."
            label_singular: Athlete
            widget: list
            fields:
              - { label: "Full Name", name: name, widget: string }
              - { label: "Unique ID", name: id, widget: string, hint: "e.g. jakob-ingebrigtsen (lowercase, hyphens, no spaces)" }
              - { label: "Country", name: country, widget: string }
              - label: "Flag"
                name: flag
                widget: select
                options:
                  - { label: "Argentina (AR)", value: "AR" }
                  - { label: "Australia (AU)", value: "AU" }
                  - { label: "Austria (AT)", value: "AT" }
                  - { label: "Bahrain (BH)", value: "BH" }
                  - { label: "Belgium (BE)", value: "BE" }
                  - { label: "Brazil (BR)", value: "BR" }
                  - { label: "Burundi (BI)", value: "BI" }
                  - { label: "Cameroon (CM)", value: "CM" }
                  - { label: "Canada (CA)", value: "CA" }
                  - { label: "Chile (CL)", value: "CL" }
                  - { label: "China (CN)", value: "CN" }
                  - { label: "Colombia (CO)", value: "CO" }
                  - { label: "Czech Republic (CZ)", value: "CZ" }
                  - { label: "Denmark (DK)", value: "DK" }
                  - { label: "Egypt (EG)", value: "EG" }
                  - { label: "Eritrea (ER)", value: "ER" }
                  - { label: "Ethiopia (ET)", value: "ET" }
                  - { label: "Finland (FI)", value: "FI" }
                  - { label: "France (FR)", value: "FR" }
                  - { label: "Georgia (GE)", value: "GE" }
                  - { label: "Germany (DE)", value: "DE" }
                  - { label: "Ghana (GH)", value: "GH" }
                  - { label: "Great Britain (GB)", value: "GB" }
                  - { label: "India (IN)", value: "IN" }
                  - { label: "Ireland (IE)", value: "IE" }
                  - { label: "Italy (IT)", value: "IT" }
                  - { label: "Jamaica (JM)", value: "JM" }
                  - { label: "Japan (JP)", value: "JP" }
                  - { label: "Kenya (KE)", value: "KE" }
                  - { label: "Mexico (MX)", value: "MX" }
                  - { label: "Morocco (MA)", value: "MA" }
                  - { label: "Netherlands (NL)", value: "NL" }
                  - { label: "New Zealand (NZ)", value: "NZ" }
                  - { label: "Nigeria (NG)", value: "NG" }
                  - { label: "Northern Ireland (NIR)", value: "NIR" }
                  - { label: "Norway (NO)", value: "NO" }
                  - { label: "Poland (PL)", value: "PL" }
                  - { label: "Portugal (PT)", value: "PT" }
                  - { label: "Qatar (QA)", value: "QA" }
                  - { label: "Rwanda (RW)", value: "RW" }
                  - { label: "Scotland (SCT)", value: "SCT" }
                  - { label: "Senegal (SN)", value: "SN" }
                  - { label: "South Africa (ZA)", value: "ZA" }
                  - { label: "South Korea (KR)", value: "KR" }
                  - { label: "Spain (ES)", value: "ES" }
                  - { label: "Sweden (SE)", value: "SE" }
                  - { label: "Switzerland (CH)", value: "CH" }
                  - { label: "Tanzania (TZ)", value: "TZ" }
                  - { label: "Turkey (TR)", value: "TR" }
                  - { label: "Uganda (UG)", value: "UG" }
                  - { label: "United States (US)", value: "US" }
                  - { label: "Wales (WAL)", value: "WAL" }
              - { label: "World Athletics URL", name: waUrl, widget: string, required: false, hint: "e.g. https://worldathletics.org/athletes/norway/jakob-ingebrigtsen-14528596 — used for auto daily sync" }
              - { label: "Photo", name: photo, widget: image, required: false, default: "" }
              - { label: "Photo BG Color", name: photoBackground, widget: string, default: "#111111", hint: "Dark hex color, e.g. #0d1b2a" }
              - { label: "Event", name: event, widget: string, hint: "e.g. MIDDLE DISTANCE" }
              - { label: "Age", name: age, widget: string }
              - { label: "Height", name: height, widget: string }
              - { label: "Weight", name: weight, widget: string }
              - { label: "Pro Seasons", name: seasons, widget: string }
              - { label: "Club", name: club, widget: string }
              - { label: "Coach", name: coach, widget: string }
              - { label: "Hometown", name: hometown, widget: string }

              - { label: "NCAA Athlete", name: ncaa, widget: boolean, default: false, required: false }
              - { label: "College", name: college, widget: string, required: false, hint: "e.g. University of Oregon" }
              - { label: "College Logo", name: collegeLogo, widget: image, required: false }

              - name: prs
                label: "Personal Records"
                widget: wa-prs

              - name: results
                label: "Season Results"
                widget: wa-results
                required: false

              - name: achievements
                label: Achievements
                widget: list
                minimize_collapsed: true
                summary: "{{icon}} {{count}} {{label}}"
                fields:
                  - { label: "Icon (emoji)", name: icon, widget: string }
                  - { label: "Count", name: count, widget: string, hint: "e.g. 2x" }
                  - { label: "Label", name: label, widget: string }

              - name: traits
                label: Trait Badges
                widget: list
                minimize_collapsed: true
                summary: "{{emoji}} {{label}}"
                fields:
                  - { label: "Emoji", name: emoji, widget: string }
                  - { label: "Label", name: label, widget: string }

              - { label: "Headline (bold)", name: headlineKey, widget: string }
              - { label: "Headline (gray)", name: headlineRest, widget: string }

              - { label: "Review Title", name: reviewTitle, widget: string, default: "Season review", hint: "Usually 'Season review' — only change if needed" }
              - { label: "Season Review", name: reviewBody, widget: text }
              - { label: "Question Title", name: questionTitle, widget: string, default: "Next question", hint: "Usually 'Next question' — only change if needed" }
              - { label: "Next Question", name: questionBody, widget: text }

  # ── RANKINGS ─────────────────────────────────────────────
  - name: rankings
    label: Rankings
    files:
      - name: rankings
        label: Rankings
        file: running-site/_data/rankings.json
        fields:
          - { label: "Year", name: year, widget: string }
          - { label: "Ranking Criteria (shown in dropdown on rankings page)", name: criteria, widget: text, required: false }
          - name: events
            label: Events
            label_singular: Event
            widget: list
            fields:
              - { label: "Event Name (e.g. 1500m)", name: name, widget: string }
              - { label: "Short Description (shown on the event card)", name: description, widget: string, required: false }
              - { label: "Card Photo", name: photo, widget: image, required: false }
              - name: rows
                label: "Main Rankings"
                label_singular: Entry
                widget: list
                fields:
                  - { label: "Athlete ID", name: athleteId, widget: string, required: false, hint: "Enter the athlete's ID from the Athletes section (e.g. jakob-ingebrigtsen). Name, country, and flag will be auto-filled from their profile. Leave blank for athletes without a profile." }
                  - { label: "Season Best", name: seasonBest, widget: string, required: false }
                  - { label: "Meet", name: meet, widget: string, required: false }
                  - { label: "Momentum (-10 to +10)", name: momentum, widget: number, min: -10, max: 10, step: 1, required: false, hint: "Trend: -10 = falling fast, 0 = neutral, +10 = rising fast. Leave blank to hide the slider." }
                  - { label: "Athlete Name (leave blank if Athlete ID is set — auto-filled)", name: name, widget: string, required: false }
                  - { label: "Country (leave blank if Athlete ID is set — auto-filled)", name: country, widget: string, required: false }
              - name: sections
                label: "Extra Sections (e.g. MIA, Injured, Retired)"
                label_singular: Section
                widget: list
                required: false
                fields:
                  - { label: "Section Title (e.g. MIA, Injured, Out of Form)", name: title, widget: string }
                  - { label: "Section Description (optional subtitle)", name: description, widget: string, required: false }
                  - name: entries
                    label: Athletes
                    label_singular: Athlete
                    widget: list
                    fields:
                      - { label: "Athlete ID", name: athleteId, widget: string, required: false, hint: "Auto-fills name, country, and flag from the athlete's profile." }
                      - { label: "Reason", name: reason, widget: string, required: false, hint: "e.g. Stress fracture — out 8 weeks, or Season-ending injury" }
                      - { label: "Momentum (-10 to +10)", name: momentum, widget: number, min: -10, max: 10, step: 1, required: false, hint: "Trend: -10 = falling fast, 0 = neutral, +10 = rising fast." }
                      - { label: "Athlete Name (leave blank if Athlete ID is set — auto-filled)", name: name, widget: string, required: false }
                      - { label: "Country (leave blank if Athlete ID is set — auto-filled)", name: country, widget: string, required: false }

  # ── SITE SETTINGS ────────────────────────────────────────
  - name: settings
    label: Site Settings
    files:
      - name: settings
        label: Site Settings
        file: running-site/_data/site.json
        fields:

          - label: "── IDENTITY ──────────────────────────────"
            name: _id_divider
            widget: hidden
            required: false

          - { label: "Site Name", name: name, widget: string }
          - { label: "SEO Tagline (browser tab / meta description)", name: tagline, widget: string, required: false }
          - { label: "Home Page Tagline (shown on homepage below nav)", name: homeTagline, widget: string, required: false, hint: "e.g. The inside track on distance running. Leave blank to hide." }
          - { label: "Accent Color", name: accentColor, widget: color, default: "#E8500A" }

          - label: "── NAVBAR ────────────────────────────────"
            name: _nav_divider
            widget: hidden
            required: false

          - { label: "Subscribe Button Label", name: subscribeLabel, widget: string, default: "Subscribe", required: false }
          - { label: "Subscribe Button URL", name: subscribeUrl, widget: string, required: false, default: "#" }
          - { label: "Podcast Nav Link URL (leave blank for #)", name: podcastUrl, widget: string, required: false }
          - { label: "Breaking News bar (leave blank to hide)", name: breakingNews, widget: string, required: false }

          - label: "── HOME PAGE ─────────────────────────────"
            name: _home_divider
            widget: hidden
            required: false

          - { label: "'Latest Articles' Section Title", name: latestArticlesTitle, widget: string, default: "Latest Articles", required: false }
          - { label: "'Editors' Picks' Label", name: editorPicksLabel, widget: string, default: "Editors' Picks", required: false }
          - { label: "Show Rankings Widget on Home Page", name: showRankingsWidget, widget: boolean, default: true, required: false }

          - label: "── ARTICLES PAGE ─────────────────────────"
            name: _articles_divider
            widget: hidden
            required: false

          - { label: "Articles Page Intro Text (shown under 'Articles' heading)", name: articlesIntro, widget: text, required: false, hint: "Leave blank to hide." }

          - label: "── RANKINGS PAGE ─────────────────────────"
            name: _rankings_divider
            widget: hidden
            required: false

          - { label: "Rankings Page Intro Text (shown under the Rankings heading)", name: rankingsIntro, widget: text, required: false, hint: "Leave blank to hide." }

          - label: "── COUNTDOWN PILL ────────────────────────"
            name: _countdown_divider
            widget: hidden
            required: false

          - name: upcomingMeets
            label: "Upcoming Meets (Countdown Pills)"
            label_singular: "Meet"
            widget: list
            required: false
            hint: "Each meet shows as a countdown pill on the home page and rankings page. Pills auto-hide if the meet is more than 60 days away or has already passed."
            fields:
              - { label: "Meet Name (e.g. Monaco Diamond League)", name: name, widget: string }
              - { label: "Date & Time (local time of the meet)", name: datetime, widget: datetime, hint: "Pick the local start time.", format: "YYYY-MM-DDTHH:mm:ssZ" }

          - label: "── FOOTER ────────────────────────────────"
            name: _footer_divider
            widget: hidden
            required: false

          - { label: "Footer Tagline", name: footerTagline, widget: string, required: false, hint: "Short description shown under the site name in the footer." }
          - { label: "Footer Copyright Text", name: footerCopyright, widget: string, required: false }

          - label: "── SOCIAL LINKS ──────────────────────────"
            name: _social_divider
            widget: hidden
            required: false

          - { label: "Twitter / X URL (leave blank to hide)", name: twitterUrl, widget: string, required: false }
          - { label: "Instagram URL (leave blank to hide)", name: instagramUrl, widget: string, required: false }
          - { label: "YouTube URL (leave blank to hide)", name: youtubeUrl, widget: string, required: false }
