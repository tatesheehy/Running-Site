<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Crop Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&family=Teko:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #E8500A;
      --dark: #111111;
      --dark-2: #1C1C1C;
      --text: #1A1A1A;
      --muted: #888888;
      --border: #333;
      --bg: #0a0a0a;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: var(--dark);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    header a {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
    }
    header a:hover { color: #fff; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      height: calc(100vh - 57px);
    }

    /* ── LEFT: CANVAS AREA ── */
    .canvas-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      overflow: hidden;
      position: relative;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 64px 48px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      width: 100%;
      max-width: 640px;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
    }
    .upload-zone-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }
    .upload-zone h2 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .upload-zone p {
      color: var(--muted);
      font-size: 13px;
    }
    .upload-zone input { display: none; }
    .upload-btn {
      margin-top: 20px;
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      border: none;
    }

    /* ── CROP CONTAINER ── */
    #crop-container {
      display: none;
      position: relative;
      cursor: crosshair;
      user-select: none;
    }

    #source-img {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 160px);
      object-fit: contain;
      pointer-events: none;
    }

    /* The crop frame */
    #crop-frame {
      position: absolute;
      border: 2px solid #fff;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
      cursor: move;
      pointer-events: none;
    }

    /* Rule of thirds grid */
    #crop-frame::before,
    #crop-frame::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.25);
    }
    #crop-frame::before {
      left: 33.33%; top: 0; bottom: 0; width: 1px;
      box-shadow: calc(33.33%) 0 0 rgba(255,255,255,0.25);
    }
    #crop-frame::after {
      top: 33.33%; left: 0; right: 0; height: 1px;
      box-shadow: 0 calc(33.33%) 0 rgba(255,255,255,0.25);
    }

    /* Corner handles — interactive */
    .handle {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 3px solid #fff;
      background: transparent;
      pointer-events: auto;
      z-index: 10;
    }
    .handle-tl { top: -3px; left: -3px; border-right: none; border-bottom: none; cursor: nw-resize; }
    .handle-tr { top: -3px; right: -3px; border-left: none; border-bottom: none; cursor: ne-resize; }
    .handle-bl { bottom: -3px; left: -3px; border-right: none; border-top: none; cursor: sw-resize; }
    .handle-br { bottom: -3px; right: -3px; border-left: none; border-top: none; cursor: se-resize; }

    /* Edge handles */
    .handle-t, .handle-b { left: 50%; transform: translateX(-50%); width: 24px; height: 8px; border: none; border-top: 3px solid rgba(255,255,255,0.7); cursor: n-resize; }
    .handle-b { border-top: none; border-bottom: 3px solid rgba(255,255,255,0.7); cursor: s-resize; top: auto; bottom: -3px; }
    .handle-l, .handle-r { top: 50%; transform: translateY(-50%); height: 24px; width: 8px; border: none; border-left: 3px solid rgba(255,255,255,0.7); cursor: w-resize; }
    .handle-r { border-left: none; border-right: 3px solid rgba(255,255,255,0.7); cursor: e-resize; left: auto; right: -3px; }

    /* ── RIGHT: SIDEBAR ── */
    .sidebar {
      background: var(--dark);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar-section h3 {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* Aspect ratio buttons */
    .ratio-btns {
      display: flex;
      gap: 8px;
    }
    .ratio-btn {
      flex: 1;
      background: var(--dark-2);
      border: 1px solid var(--border);
      color: #fff;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .ratio-btn:hover { border-color: #555; }
    .ratio-btn.active { border-color: var(--accent); background: rgba(232,80,10,0.15); }
    .ratio-btn small { display: block; font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* Preview */
    .preview-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      background: #222;
      aspect-ratio: 1.6;
    }
    #preview-img {
      position: absolute;
      height: auto;
      display: block;
      max-width: none;
    }

    /* Result box */
    .result-box {
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
    }
    .result-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .result-value {
      font-family: monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
      word-break: break-all;
    }
    .copy-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .copy-btn:hover { opacity: 0.88; }
    .copy-btn.copied { background: #2a9d2a; }

    .instructions {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
    .instructions strong { color: #fff; }

    .new-image-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 9px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .new-image-btn:hover { border-color: #555; color: #fff; }

    .zoom-badge {
      display: inline-block;
      background: rgba(232,80,10,0.2);
      border: 1px solid rgba(232,80,10,0.4);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 3px;
      margin-left: 8px;
      font-family: monospace;
    }
  </style>
</head>
<body>

<header>
  <h1>Image Crop Tool</h1>
  <a href="index.html">← Back to site</a>
</header>

<div class="layout">
  <!-- LEFT CANVAS -->
  <div class="canvas-area" id="canvas-area">

    <label class="upload-zone" id="upload-zone">
      <div class="upload-zone-icon">🖼️</div>
      <h2>Upload your image</h2>
      <p>Drag & drop or click to browse</p>
      <button class="upload-btn" type="button" onclick="document.getElementById('file-input').click()">Choose Image</button>
      <input type="file" id="file-input" accept="image/*">
    </label>

    <div id="crop-container">
      <img id="source-img" alt="Source image">
      <div id="crop-frame">
        <div class="handle handle-tl" data-corner="tl"></div>
        <div class="handle handle-tr" data-corner="tr"></div>
        <div class="handle handle-bl" data-corner="bl"></div>
        <div class="handle handle-br" data-corner="br"></div>
      </div>
    </div>

  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar" id="sidebar">

    <div class="sidebar-section">
      <h3>Crop Shape</h3>
      <div class="ratio-btns">
        <button class="ratio-btn active" data-ratio="1.6" onclick="setRatio(this)">
          16:10
          <small>Article card</small>
        </button>
        <button class="ratio-btn" data-ratio="1.7778" onclick="setRatio(this)">
          16:9
          <small>Hero / featured</small>
        </button>
        <button class="ratio-btn" data-ratio="1" onclick="setRatio(this)">
          1:1
          <small>Square</small>
        </button>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Live Preview <span id="zoom-badge" class="zoom-badge" style="display:none;"></span></h3>
      <div class="preview-wrap" id="preview-wrap">
        <img id="preview-img" alt="Preview">
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Result</h3>
      <div class="result-box">
        <div class="result-label" id="result-label">Drag frame to position · Drag corners to zoom</div>
        <div class="result-value" id="result-value">—</div>
        <button class="copy-btn" id="save-btn" onclick="saveCrop()">✓ Save Crop</button>
        <button class="copy-btn" id="copy-btn" onclick="copyResult()" style="margin-top:8px;background:#333;">Copy Value</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>How to use</h3>
      <p class="instructions">
        1. Upload your image<br>
        2. <strong>Drag the white frame</strong> to pan<br>
        3. <strong>Drag the corner handles</strong> to zoom in/out<br>
        4. Click <strong>Save Crop</strong> — done!
      </p>
    </div>

    <button class="new-image-btn" id="new-image-btn" onclick="resetTool()" style="display:none;">
      ↩ Use a different image
    </button>

  </div>
</div>

<script>
  const fileInput = document.getElementById('file-input');
  const uploadZone = document.getElementById('upload-zone');
  const cropContainer = document.getElementById('crop-container');
  const sourceImg = document.getElementById('source-img');
  const cropFrame = document.getElementById('crop-frame');
  const previewImg = document.getElementById('preview-img');
  const previewWrap = document.getElementById('preview-wrap');
  const resultValue = document.getElementById('result-value');
  const newImageBtn = document.getElementById('new-image-btn');
  const zoomBadge = document.getElementById('zoom-badge');

  // ── POST MESSAGE TO CMS PARENT ──
  function notifyParent(val) {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'cropPosition', value: val }, '*');
    }
  }

  let imgNaturalW = 0, imgNaturalH = 0;
  let imgDisplayW = 0, imgDisplayH = 0;
  let imgOffsetX = 0, imgOffsetY = 0;
  let frameW = 0, frameH = 0;
  let frameX = 0, frameY = 0;
  let currentRatio = 1.6;

  // Interaction state
  let activeAction = null; // 'drag' | 'resize-tl' | 'resize-tr' | 'resize-bl' | 'resize-br'
  let pointerStartX = 0, pointerStartY = 0;
  let frameStartX = 0, frameStartY = 0, frameStartW = 0, frameStartH = 0;
  let currentSrc = '';
  const MIN_FRAME = 40; // px

  // ── UPLOAD ──
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) loadFile(file);
  });

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = e => initCrop(e.target.result);
    reader.readAsDataURL(file);
  }

  function initCrop(src, initialCrop) {
    currentSrc = src;
    sourceImg.src = src;
    previewImg.src = src;

    sourceImg.onload = () => {
      imgNaturalW = sourceImg.naturalWidth;
      imgNaturalH = sourceImg.naturalHeight;

      uploadZone.style.display = 'none';
      cropContainer.style.display = 'block';
      newImageBtn.style.display = 'block';

      requestAnimationFrame(() => {
        recalcLayout();
        if (initialCrop) {
          restoreCrop(initialCrop);
        } else {
          centerFrame();
        }
        updateResult();
        updatePreview();
      });
    };
  }

  function recalcLayout() {
    const rect = sourceImg.getBoundingClientRect();
    imgDisplayW = rect.width;
    imgDisplayH = rect.height;
    imgOffsetX = rect.left - cropContainer.getBoundingClientRect().left;
    imgOffsetY = rect.top - cropContainer.getBoundingClientRect().top;

    // Default frame: ~80% of the shorter dimension
    const shorter = Math.min(imgDisplayW, imgDisplayH);
    frameW = Math.min(shorter * 1.0, imgDisplayW * 0.8);
    frameH = frameW / currentRatio;
    if (frameH > imgDisplayH * 0.9) {
      frameH = imgDisplayH * 0.9;
      frameW = frameH * currentRatio;
    }
  }

  function centerFrame() {
    frameX = imgOffsetX + (imgDisplayW - frameW) / 2;
    frameY = imgOffsetY + (imgDisplayH - frameH) / 2;
    positionFrame();
  }

  function positionFrame() {
    cropFrame.style.left = frameX + 'px';
    cropFrame.style.top = frameY + 'px';
    cropFrame.style.width = frameW + 'px';
    cropFrame.style.height = frameH + 'px';
  }

  // Restore a previously-saved crop value to the frame
  function restoreCrop(val) {
    const m = String(val).match(/x:([\d.]+),y:([\d.]+),w:([\d.]+),h:([\d.]+)/);
    if (!m) { centerFrame(); return; }
    const xPct = +m[1], yPct = +m[2], wPct = +m[3], hPct = +m[4];
    frameW = (wPct / 100) * imgDisplayW;
    frameH = (hPct / 100) * imgDisplayH;
    frameX = imgOffsetX + (xPct / 100) * imgDisplayW;
    frameY = imgOffsetY + (yPct / 100) * imgDisplayH;
    positionFrame();
  }

  // ── DRAG HANDLING ──
  cropContainer.addEventListener('mousedown', e => {
    // Don't start drag if a handle started a resize
    if (activeAction && activeAction.startsWith('resize')) return;
    activeAction = 'drag';
    pointerStartX = e.clientX;
    pointerStartY = e.clientY;
    frameStartX = frameX;
    frameStartY = frameY;
    e.preventDefault();
  });

  // ── RESIZE HANDLE HANDLING ──
  document.querySelectorAll('.handle[data-corner]').forEach(handle => {
    handle.addEventListener('mousedown', e => {
      e.stopPropagation(); // don't trigger container drag
      activeAction = 'resize-' + handle.dataset.corner;
      pointerStartX = e.clientX;
      pointerStartY = e.clientY;
      frameStartX = frameX;
      frameStartY = frameY;
      frameStartW = frameW;
      frameStartH = frameH;
      e.preventDefault();
    });
  });

  // ── POINTER MOVE ──
  window.addEventListener('mousemove', e => {
    if (!activeAction) return;
    const dx = e.clientX - pointerStartX;
    const dy = e.clientY - pointerStartY;

    if (activeAction === 'drag') {
      const minX = imgOffsetX;
      const maxX = imgOffsetX + imgDisplayW - frameW;
      const minY = imgOffsetY;
      const maxY = imgOffsetY + imgDisplayH - frameH;
      frameX = Math.max(minX, Math.min(maxX, frameStartX + dx));
      frameY = Math.max(minY, Math.min(maxY, frameStartY + dy));
    } else if (activeAction.startsWith('resize')) {
      const corner = activeAction.split('-')[1]; // tl, tr, bl, br
      applyResize(corner, dx, dy);
    }

    positionFrame();
    updateResult();
    updatePreview();
  });

  window.addEventListener('mouseup', () => { activeAction = null; });

  function applyResize(corner, dx, dy) {
    // Anchor = opposite corner; moving corner follows mouse
    let newW, newH, newX, newY;

    if (corner === 'br') {
      // Anchor TL: only size changes, position stays
      newW = frameStartW + dx;
    } else if (corner === 'bl') {
      // Anchor TR: x moves, width changes inversely
      newW = frameStartW - dx;
    } else if (corner === 'tr') {
      // Anchor BL: y moves, height changes; use dx for width
      newW = frameStartW + dx;
    } else { // tl
      // Anchor BR: both x and y move, size shrinks
      newW = frameStartW - dx;
    }

    // Enforce minimum size
    newW = Math.max(MIN_FRAME, newW);
    // Clamp to image width
    newW = Math.min(imgDisplayW, newW);
    // Height from ratio
    newH = newW / currentRatio;
    // Clamp to image height
    if (newH > imgDisplayH) {
      newH = imgDisplayH;
      newW = newH * currentRatio;
    }

    // Update position based on which corner is anchored
    if (corner === 'br') {
      // TL stays
      newX = frameStartX;
      newY = frameStartY;
    } else if (corner === 'bl') {
      // TR stays: right edge = frameStartX + frameStartW
      newX = frameStartX + frameStartW - newW;
      newY = frameStartY;
    } else if (corner === 'tr') {
      // BL stays: bottom edge = frameStartY + frameStartH
      newX = frameStartX;
      newY = frameStartY + frameStartH - newH;
    } else { // tl
      // BR stays: right = frameStartX + frameStartW, bottom = frameStartY + frameStartH
      newX = frameStartX + frameStartW - newW;
      newY = frameStartY + frameStartH - newH;
    }

    // Clamp to image bounds
    newX = Math.max(imgOffsetX, Math.min(imgOffsetX + imgDisplayW - newW, newX));
    newY = Math.max(imgOffsetY, Math.min(imgOffsetY + imgDisplayH - newH, newY));

    frameW = newW;
    frameH = newH;
    frameX = newX;
    frameY = newY;
  }

  // Touch support for drag
  cropContainer.addEventListener('touchstart', e => {
    const t = e.touches[0];
    activeAction = 'drag';
    pointerStartX = t.clientX;
    pointerStartY = t.clientY;
    frameStartX = frameX;
    frameStartY = frameY;
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('touchmove', e => {
    if (activeAction !== 'drag') return;
    const t = e.touches[0];
    const dx = t.clientX - pointerStartX;
    const dy = t.clientY - pointerStartY;
    const minX = imgOffsetX;
    const maxX = imgOffsetX + imgDisplayW - frameW;
    const minY = imgOffsetY;
    const maxY = imgOffsetY + imgDisplayH - frameH;
    frameX = Math.max(minX, Math.min(maxX, frameStartX + dx));
    frameY = Math.max(minY, Math.min(maxY, frameStartY + dy));
    positionFrame();
    updateResult();
    updatePreview();
  }, { passive: false });

  window.addEventListener('touchend', () => { activeAction = null; });

  // ── RESULT ──
  function updateResult() {
    const relX = frameX - imgOffsetX;
    const relY = frameY - imgOffsetY;

    // Store as percentage of image display size (same as natural, since we use fractions)
    const xPct = Math.round((relX / imgDisplayW) * 100);
    const yPct = Math.round((relY / imgDisplayH) * 100);
    const wPct = Math.round((frameW / imgDisplayW) * 100);
    const hPct = Math.round((frameH / imgDisplayH) * 100);
    const ar = (imgNaturalW / imgNaturalH).toFixed(4);

    const val = `x:${xPct},y:${yPct},w:${wPct},h:${hPct},ar:${ar}`;
    resultValue.textContent = val;

    // Show zoom level
    const zoom = (100 / wPct).toFixed(2);
    zoomBadge.style.display = '';
    zoomBadge.textContent = zoom + '×';
  }

  // ── PREVIEW ── (shows the actual crop, not just focal point)
  function updatePreview() {
    const relX = frameX - imgOffsetX;
    const relY = frameY - imgOffsetY;
    const wPct = (frameW / imgDisplayW) * 100;
    const hPct = (frameH / imgDisplayH) * 100;
    const xPct = (relX / imgDisplayW) * 100;
    const yPct = (relY / imgDisplayH) * 100;
    const iAR = imgNaturalW / imgNaturalH;

    // Apply same formula as the site's app.js cropImgStyle()
    const imgWidthPct = (10000 / wPct).toFixed(2);
    const imgLeftPct = (-(xPct / wPct) * 100).toFixed(2);
    const imgTopPct = (-(yPct * currentRatio * 100) / (wPct * iAR)).toFixed(2);

    previewImg.style.width = imgWidthPct + '%';
    previewImg.style.left = imgLeftPct + '%';
    previewImg.style.top = imgTopPct + '%';

    // Preview aspect ratio matches current ratio button
    previewWrap.style.aspectRatio = currentRatio;
  }

  // ── SAVE CROP (sends to CMS parent) ──
  function saveCrop() {
    const val = resultValue.textContent;
    if (!val || val === '—') return;
    notifyParent(val);
    const btn = document.getElementById('save-btn');
    btn.textContent = '✓ Saved!';
    btn.style.background = '#2a9d2a';
    setTimeout(() => {
      btn.textContent = '✓ Save Crop';
      btn.style.background = '';
    }, 2000);
  }

  // ── COPY ──
  function copyResult() {
    const val = resultValue.textContent;
    if (!val || val === '—') return;
    navigator.clipboard.writeText(val).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy Value';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  // ── RATIO ──
  function setRatio(btn) {
    document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRatio = parseFloat(btn.dataset.ratio);

    // Adjust frame height for new ratio while keeping width (and center)
    const centerX = frameX + frameW / 2;
    const centerY = frameY + frameH / 2;
    frameH = frameW / currentRatio;
    if (frameH > imgDisplayH) { frameH = imgDisplayH; frameW = frameH * currentRatio; }
    frameX = Math.max(imgOffsetX, Math.min(imgOffsetX + imgDisplayW - frameW, centerX - frameW / 2));
    frameY = Math.max(imgOffsetY, Math.min(imgOffsetY + imgDisplayH - frameH, centerY - frameH / 2));
    positionFrame();
    updateResult();
    updatePreview();
  }

  // ── RESET ──
  function resetTool() {
    uploadZone.style.display = '';
    cropContainer.style.display = 'none';
    newImageBtn.style.display = 'none';
    sourceImg.src = '';
    previewImg.src = '';
    fileInput.value = '';
  }

  // ── EMBED MODE: auto-load image from URL param ──
  const params = new URLSearchParams(window.location.search);
  const isEmbed = params.get('embed') === '1';
  const urlParam = params.get('url');
  const valParam = params.get('val'); // restore saved crop position

  if (isEmbed) {
    const header = document.querySelector('header');
    if (header) header.style.display = 'none';
    document.body.style.background = '#111';

    if (urlParam) {
      initCrop(urlParam, valParam || null);
    }
  }

  // Recalc on resize
  window.addEventListener('resize', () => {
    if (cropContainer.style.display !== 'none') {
      recalcLayout();
      centerFrame();
      updateResult();
      updatePreview();
    }
  });
</script>
</body>
</html>
